<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About | reqs.tech</title>
    <link rel="stylesheet" href="css/style.css" type="text/css" />
    <script src="js/title-refresh.js" defer></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const toggle = document.querySelector('.toggle-switch');
            const active = 'active';
            const light = 'light-mode';

            if (body.classList.contains(light)) {
                body.classList.remove(light);
                toggle.classList.remove(active);
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add(light);
                toggle.classList.add(active);
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = () => {
            const toggle = document.querySelector('.toggle-switch');
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                toggle.classList.add('active');
            }
        };
    </script>
</head>
<body>
    <nav class="nav-container">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="resources.html">Resources</a>
        </div>
        <div class="nav-buttons">
            <div class="toggle-container">
                <div class="toggle-switch" onclick="toggleTheme()">
                    <div class="switch-thumb"></div>
                </div>
                <span>Dark Mode</span>
            </div>
            <a href="mailto:cb@reqs.tech" class="email-button">Contact Me</a>
        </div>
    </nav>

    <main>
        <div class="hero-section">
            <h1>About</h1>
            <p>Technically creative. Creatively technical. Wholeheartedly both.</p>
        </div>

        <section class="intro">
            <p>reqs.tech</p>
        </section>
    </main>
</body>
</html>
