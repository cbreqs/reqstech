<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REQS | Building Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Red+Hat+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0c0f1a;
      --text-dark: #a8cbe0;
      --hover-dark: #ffffff;
      --bg-light: #f6f4f0;
      --text-light: #2b3a42;
      --hover-light: #000000;
      --container-bg-dark: #1a1e2e;
      --container-bg-light: #ffffff;
      --border-dark: #a8cbe0;
      --border-light: #2b3a42;
      --accent-light: #a8cbe0;
      --accent-dark: #2b3a42;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Playfair Display', serif;
      background-color: var(--bg-dark);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .top-bar, .bottom-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 0.9rem;
    }

    .main-container {
      background-color: var(--container-bg-dark);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-dark);
      transition: background-color 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .main-quote {
      font-size: 2rem;
      font-style: italic;
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration: none;
      padding: 0.75rem;
      border: 1px solid currentColor;
      border-radius: 4px;
      transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    a:hover {
      background-color: var(--accent-light);
      color: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .light-mode {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    .light-mode .main-container {
      background-color: var(--container-bg-light);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border-light);
    }

    .light-mode a:hover {
      background-color: var(--accent-dark);
      color: var(--accent-light);
      border-color: var(--accent-light);
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="mailto:courtney.hays@reqs.tech">email</a>
    <a href="#" onclick="toggleMode()">light / dark</a>
  </div>

  <div class="main-container">
    <div class="main-quote">a workaround is not a solution</div>
  </div>

  <div class="bottom-bar">
    <a href="about.html">about</a>
    <a href="projects.html">projects</a>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle('light-mode');
    }
  </script>
</body>
</html>
