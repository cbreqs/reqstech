<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reqs.tech</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Red+Hat+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <button onclick="location.href='mailto:cb@reqs.tech'">email</button>
    <button id="toggle-theme">light/dark</button>
  </header>

  <main>
    <h1>a workaround is not a solution</h1>
  </main>

  <footer class="page-nav">
    <div class="nav-left">
      <button onclick="location.href='about.html'">About</button>
    </div>
    <div class="nav-center">
      <button onclick="location.href='index.html'">Home</button>
    </div>
    <div class="nav-right">
      <button onclick="location.href='projects.html'">Projects</button>
    </div>
  </footer>

  <script src="js/absolutely-nothing.js" defer></script>
  <script>
    let rerollButton;
    let container = document.getElementById("easter-egg-slot");
    let currentPage = window.location.pathname;

    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key.toLowerCase() === 'r') {
        if (!rerollButton && currentPage !== '/index.html') {
          rerollButton = document.createElement('button');
          rerollButton.textContent = "civil options";
          rerollButton.className = "civil-btn";
          rerollButton.addEventListener('click', () => {
            window.location.href = 'civil.html'; // Redirect to civil.html
          });
          container.appendChild(rerollButton);
        } else {
          rerollButton.style.display = rerollButton.style.display === "none" ? "block" : "none";
        }
      }
    });
  </script>
</body>
</html>
