<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reqs.tech | Building Solutions</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/absolutely-nothing.js" defer></script> <!-- Correct JS file link -->
</head>
<body>
  <header>
    <button onclick="location.href='mailto:cb@reqs.tech'">email</button>
    <button id="toggle-theme">light/dark</button>
  </header>

  <main>
    <h1>a workaround is not a solution</h1> <!-- Motto only on the homepage -->
  </main>

  <footer>
    <div class="nav-left">
      <button onclick="location.href='about.html'">About</button>
    </div>
    <div class="nav-center">
      <!-- Blank space for Shift+R Civil button -->
    </div>
    <div class="nav-right">
      <button onclick="location.href='projects.html'">Projects</button>
    </div>
  </footer>

  <script>
    let rerollButton;
    let container = document.getElementById("civil-slot");
    let currentPage = window.location.pathname;

    document.addEventListener('keydown', (e) => {
      // Check for Shift+R key combination
      if (e.shiftKey && e.key.toLowerCase() === 'r') {
        if (!rerollButton && currentPage !== '/index.html') {
          rerollButton = document.createElement('button');
          rerollButton.textContent = "civil options";
          rerollButton.className = "civil-btn";

          // When clicked, redirect to civil.html
          rerollButton.addEventListener('click', () => {
            window.location.href = 'civil.html'; // Redirect to civil.html
          });

          container.appendChild(rerollButton);
        } else if (rerollButton) {
          rerollButton.style.display = rerollButton.style.display === "none" ? "block" : "none"; // Toggle visibility
        }
      }

      // Hide the Civil button on the homepage
      if (currentPage === '/index.html') {
        if (rerollButton) {
          rerollButton.style.display = "none"; // Ensure Civil button is hidden on homepage at all times
        }
      }
    });
  </script>
</body>
</html>
