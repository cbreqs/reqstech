<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reqs.tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Red+Hat+Display:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    // tiny pale blue - not enough contrast or size, deal with it later if i happen to remember
    <img src="assets/pale-blue-dot_reqs-style.svg" alt="REQS mark" width="64" height="64">
    <button onclick="location.href='mailto:cb@reqs.tech'">email</button>
    <button id="toggle-theme">light/dark</button>
  </header>

  <main>
    <h1>a workaround is not a solution</h1>
  </main>

  <script>
  // Light/Dark Toggle
  const toggle = document.getElementById('toggle-theme');
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
  });

  // Rotating Tab Title (fully randomized)
  const titles = [
    "reqs.tech | Technically Creative",
    "reqs.tech | Creatively Technical",
    "reqs.tech | Engineering Creativity",
    "reqs.tech | BIM Solutions",
    "reqs.tech | Technical Ingenuity",
    "reqs.tech | Creative BIM",
    "reqs.tech | BIM Ingenuity",
    "reqs.tech | Building BIM",
    "reqs.tech | Building Creativity",
    "reqs.tech | Creative Building"
  ];

  function rotateTitle() {
    const randomIndex = Math.floor(Math.random() * titles.length);
    document.title = titles[randomIndex];
  }

  // Rotate once on load
  rotateTitle();

  // DevMode Toggle: Press Shift+R to show/hide the "new vibe" button
  let rerollButton;

  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && e.key.toLowerCase() === 'r') {
      if (!rerollButton) {
        rerollButton = document.createElement('button');
        rerollButton.textContent = "new vibe";

        Object.assign(rerollButton.style, {
          position: "fixed",
          bottom: "1rem",
          right: "1rem",
          zIndex: "1000",
          padding: "0.5rem 1rem",
          fontFamily: "'Red Hat Display', sans-serif",
          fontSize: "0.9rem",
          backgroundColor: "transparent",
          border: "1px solid var(--text-color, #ccc)",
          color: "var(--text-color, #ccc)",
          borderRadius: "0.5rem",
          cursor: "pointer",
          opacity: "0.6",
          transition: "opacity 0.3s ease",
          backdropFilter: "blur(4px)"
        });

        rerollButton.addEventListener("mouseover", () => rerollButton.style.opacity = "1");
        rerollButton.addEventListener("mouseout", () => rerollButton.style.opacity = "0.6");

        rerollButton.addEventListener('click', rotateTitle);

        document.body.appendChild(rerollButton);
      } else {
        rerollButton.style.display = rerollButton.style.display === "none" ? "block" : "none";
      }
    }
  });
  </script>
</body>
</html>
